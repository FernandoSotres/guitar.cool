<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>guitarra.cool ┬╖ Progresiones y Grados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#faf6f0;--paper2:#f2ece3;--paper3:#e8e0d4;--paper4:#ddd4c4;--paper5:#cec4b0;
  --copper:#a05c20;--copper-lt:#c07830;--copper-dk:#7a4010;
  --ink:#1a1410;--ink2:#2e2418;--ink3:#4a3c2c;--ink4:#6a5a46;--ink5:#8a7a66;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;}

nav{position:sticky;top:0;z-index:100;background:rgba(250,246,240,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--paper4);padding:0 48px;display:flex;align-items:center;height:56px;gap:0;}
.nav-logo{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ink);margin-right:36px;letter-spacing:-.01em;text-decoration:none;}
.nav-logo span{color:var(--copper);}
.nav-link{padding:0 16px;height:56px;display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--ink4);text-decoration:none;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
.nav-link:hover{color:var(--ink2);}
.nav-link.active{color:var(--copper);border-bottom-color:var(--copper);}

.ex-page{max-width:860px;margin:0 auto;padding:48px 24px 80px;}

.ex-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;flex-wrap:wrap;}
.ex-back{font-size:13px;color:var(--ink4);text-decoration:none;display:flex;align-items:center;gap:6px;padding-top:6px;transition:color .2s;white-space:nowrap;}
.ex-back:hover{color:var(--copper);}
.ex-title-block{flex:1;min-width:200px;}
.ex-eyebrow{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--copper);margin-bottom:6px;}
.ex-title{font-family:var(--serif);font-size:clamp(28px,4vw,40px);font-weight:700;line-height:1.05;letter-spacing:-.02em;}
.ex-score-block{display:flex;align-items:center;gap:8px;padding-top:4px;}
.score-chip{font-family:var(--mono);font-size:13px;background:var(--paper3);padding:6px 14px;border-radius:20px;white-space:nowrap;}
.score-chip .c-ok{color:#4a7c59;}
.score-chip .c-tot{color:var(--ink5);}

.mode-bar{display:flex;gap:6px;margin-bottom:36px;flex-wrap:wrap;}
.mode-btn{font-size:12px;font-weight:600;padding:7px 15px;border:1.5px solid var(--paper4);border-radius:20px;background:transparent;color:var(--ink4);cursor:pointer;transition:all .18s;letter-spacing:.02em;font-family:var(--sans);}
.mode-btn:hover{border-color:var(--copper-lt);color:var(--copper);}
.mode-btn.active{border-color:var(--copper);background:var(--copper);color:#fff;}

.ex-main{display:flex;flex-direction:column;align-items:center;gap:28px;}

/* Question card */
.question-card{text-align:center;padding:24px 40px;background:#fff;border:1px solid var(--paper3);border-radius:16px;width:100%;max-width:580px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.q-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--copper);margin-bottom:8px;}
.q-text{font-family:var(--serif);font-size:clamp(20px,3.5vw,28px);font-weight:700;line-height:1.3;color:var(--ink);}
.q-sub{font-size:13px;color:var(--ink4);margin-top:6px;font-style:italic;}

/* Key display bar */
.key-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:4px;}
.key-label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--ink5);}
.key-name{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--copper);}

/* 7-degree palette */
.degree-palette{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;width:100%;max-width:620px;}
.degree-box{border:2px solid var(--paper4);border-radius:10px;padding:12px 4px;text-align:center;background:#fff;position:relative;transition:border-color .18s,background .18s;}
.degree-box.highlighted{border-color:var(--copper);background:#fdf4ec;}
.degree-box.correct{border-color:#4a7c59;background:#e8f5ec;}
.degree-box.wrong{border-color:#c0392b;background:#fcecea;}
.degree-box.clickable{cursor:pointer;}
.degree-box.clickable:hover:not(.correct):not(.wrong):not(.highlighted){border-color:var(--copper-lt);background:var(--paper2);}
.degree-box.dim-style .d-roman{color:var(--ink5);}
.d-roman{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;min-height:20px;}
.d-note{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--ink);min-height:24px;}
.d-quality{font-size:10px;color:var(--ink5);margin-top:2px;min-height:14px;font-weight:500;}
.d-roman.hidden, .d-note.hidden, .d-quality.hidden{visibility:hidden;}
.d-note.ask{color:var(--copper);font-size:20px;}

/* Progression display */
.prog-display{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;}
.prog-chord{display:flex;flex-direction:column;align-items:center;padding:12px 16px;border:2px solid var(--paper4);border-radius:10px;background:#fff;min-width:70px;}
.prog-chord.asking{border-color:var(--copper);background:#fdf4ec;}
.prog-chord.answered-ok{border-color:#4a7c59;background:#e8f5ec;}
.prog-chord.answered-bad{border-color:#c0392b;background:#fcecea;}
.prog-chord .pc-roman{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--ink);}
.prog-chord .pc-name{font-size:13px;color:var(--ink4);margin-top:2px;min-height:18px;}
.prog-sep{font-family:var(--serif);font-size:22px;color:var(--paper5);font-weight:300;}

/* Answer choices */
.choices{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:500px;}
.choice-btn{font-family:var(--sans);font-size:14px;font-weight:600;padding:10px 20px;border:2px solid var(--paper4);border-radius:8px;background:#fff;color:var(--ink);cursor:pointer;transition:all .18s;min-width:90px;text-align:center;}
.choice-btn:hover:not(:disabled){border-color:var(--copper);color:var(--copper);}
.choice-btn.correct{border-color:#4a7c59;background:#4a7c59;color:#fff;cursor:default;}
.choice-btn.wrong{border-color:#c0392b;background:#c0392b;color:#fff;cursor:default;}
.choice-btn:disabled{cursor:default;}

.feedback-msg{font-size:15px;font-weight:500;text-align:center;min-height:22px;}
.feedback-msg.ok{color:#4a7c59;}
.feedback-msg.bad{color:#c0392b;}

.btn-next{background:var(--copper);color:#fff;font-size:14px;font-weight:600;padding:12px 32px;border:none;border-radius:8px;cursor:pointer;transition:background .2s;font-family:var(--sans);display:none;}
.btn-next:hover{background:var(--copper-dk);}
.btn-next.show{display:inline-block;}

.start-overlay{text-align:center;}
.btn-start{background:var(--copper);color:#fff;font-size:15px;font-weight:600;padding:14px 44px;border:none;border-radius:10px;cursor:pointer;transition:background .2s;font-family:var(--sans);}
.btn-start:hover{background:var(--copper-dk);}
.start-hint{font-size:14px;color:var(--ink4);margin-top:16px;font-style:italic;}

@media(max-width:640px){
  nav{padding:0 16px;overflow-x:auto;flex-wrap:nowrap;white-space:nowrap;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav>*{flex-shrink:0;}
  .ex-page{padding:32px 16px 64px;}
  .question-card{padding:20px;}
  .degree-palette{gap:4px;}
  .degree-box{padding:8px 2px;}
  .d-note{font-size:14px;}
  .d-roman{font-size:13px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">guitarra<span>.cool</span></a>
  <a href="/teoria" class="nav-link">Teor├φa</a>
  <a href="/practica" class="nav-link active">Pr├κctica</a>
  <a href="/herramientas" class="nav-link">Herramientas</a>
</nav>

<div class="ex-page">

  <div class="ex-header">
    <a href="/practica" class="ex-back">έΗΡ Pr├κctica</a>
    <div class="ex-title-block">
      <div class="ex-eyebrow">Teor├φa Visual</div>
      <h1 class="ex-title">Progresiones y Grados</h1>
    </div>
    <div class="ex-score-block">
      <div class="score-chip">
        <span class="c-ok" id="score-correct">0</span>
        <span class="c-tot" id="score-total"> / 0</span>
      </div>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="grado-acorde">Grado έΗΤ Acorde</button>
    <button class="mode-btn" data-mode="acorde-grado">Acorde έΗΤ Grado</button>
    <button class="mode-btn" data-mode="progresion">Progresi├│n completa</button>
  </div>

  <div class="ex-main" id="ex-main">

    <div class="question-card" id="question-card" style="visibility:hidden;">
      <div class="q-label" id="q-label">Grado</div>
      <div class="q-text" id="q-text">έΑΦ</div>
      <div class="q-sub" id="q-sub"></div>
    </div>

    <div class="key-bar" id="key-bar" style="visibility:hidden;">
      <span class="key-label">Tonalidad:</span>
      <span class="key-name" id="key-name">έΑΦ</span>
    </div>

    <!-- Degree palette (modes 1 and 2) -->
    <div class="degree-palette" id="degree-palette"></div>

    <!-- Progression display (mode 3) -->
    <div class="prog-display" id="prog-display" style="display:none;"></div>

    <!-- Answer choices -->
    <div class="choices" id="choices" style="display:none;"></div>

    <div class="feedback-msg" id="feedback"></div>

    <div class="start-overlay" id="start-overlay">
      <button class="btn-start" id="btn-start">Empezar ejercicio</button>
      <p class="start-hint">Practica grados y progresiones en cualquier tonalidad</p>
    </div>

    <button class="btn-next" id="btn-next">Siguiente έΗΤ</button>

  </div>
</div>

<script>
// έΦΑέΦΑ Data έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
const NOTES_S = ['C','Cέβψ','D','Dέβψ','E','F','Fέβψ','G','Gέβψ','A','Aέβψ','B'];
const KEY_NAMES = [
  'Do','Doέβψ','Re','Reέβψ','Mi','Fa','Faέβψ','Sol','Solέβψ','La','Laέβψ','Si'
];

// Major scale degrees
const SCALE_IVS = [0,2,4,5,7,9,11];
const DEGREE_QUALITY = ['M','m','m','M','M','m','┬░'];
const DEGREE_ROMAN   = ['I','II','III','IV','V','VI','VII'];
const DEGREE_ROMAN_MINOR = ['i','ii┬░','III','iv','v','VI','VII'];

// Display quality labels
const QUALITY_LABEL = { 'M':'mayor','m':'menor','┬░':'dim.' };

// Common progressions: array of degree indices (0-based into scale)
const PROGRESSIONS = [
  { name:'I - IV - V',     degrees:[0,3,4] },
  { name:'I - V - VI - IV', degrees:[0,4,5,3] },
  { name:'I - VI - IV - V', degrees:[0,5,3,4] },
  { name:'II - V - I',     degrees:[1,4,0] },
  { name:'I - III - VI - IV',degrees:[0,2,5,3] },
  { name:'I - IV - V - IV', degrees:[0,3,4,3] },
  { name:'VI - IV - I - V', degrees:[5,3,0,4] },
  { name:'I - VI - II - V', degrees:[0,5,1,4] },
];

// έΦΑέΦΑ State έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
const S = {
  mode: 'grado-acorde',
  started: false,
  answered: false,
  rootIdx: 0,
  askDeg: 0,         // which degree index is being asked (0-6)
  ansDegIdx: 0,      // for acorde-grado
  progIdx: 0,        // which progression
  progStep: 0,       // current step in progression mode
  scoreOk: 0,
  scoreTotal: 0,
};

// έΦΑέΦΑ Helpers έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function getDegrees(rootIdx) {
  return SCALE_IVS.map((iv, i) => ({
    noteIdx: (rootIdx + iv) % 12,
    note: NOTES_S[(rootIdx + iv) % 12],
    quality: DEGREE_QUALITY[i],
    roman: DEGREE_ROMAN[i],
    label: QUALITY_LABEL[DEGREE_QUALITY[i]],
    chordName: NOTES_S[(rootIdx + iv) % 12] + (DEGREE_QUALITY[i]==='M'?' mayor':DEGREE_QUALITY[i]==='m'?' menor':' dim.'),
    shortName: NOTES_S[(rootIdx + iv) % 12] + (DEGREE_QUALITY[i]==='m'?'m':DEGREE_QUALITY[i]==='┬░'?'┬░':''),
  }));
}

function randInt(n) { return Math.floor(Math.random()*n); }

function shuffle(arr) {
  const a=[...arr];
  for(let j=a.length-1;j>0;j--){const k=randInt(j+1);[a[j],a[k]]=[a[k],a[j]];}
  return a;
}

// έΦΑέΦΑ Palette builder έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function buildPalette(degrees, options) {
  // options: { hideNotes, hideRomans, clickable, highlighted, correct, wrong }
  const pal = document.getElementById('degree-palette');
  pal.innerHTML = '';
  degrees.forEach((d,i) => {
    const box = document.createElement('div');
    box.className = 'degree-box';
    if(d.quality==='┬░') box.classList.add('dim-style');
    if(options.highlighted===i) box.classList.add('highlighted');
    if(options.correct===i) box.classList.add('correct');
    if(options.wrong===i) box.classList.add('wrong');
    if(options.clickable) box.classList.add('clickable');

    const rDiv = document.createElement('div');
    rDiv.className = 'd-roman';
    if(options.hideRomans) rDiv.classList.add('hidden');
    rDiv.textContent = d.roman;

    const nDiv = document.createElement('div');
    nDiv.className = 'd-note';
    if(options.hideNotes) {
      nDiv.classList.add('hidden');
    } else if(options.askNote===i) {
      nDiv.classList.add('ask');
      nDiv.textContent = '?';
    } else {
      nDiv.textContent = d.note;
    }

    const qDiv = document.createElement('div');
    qDiv.className = 'd-quality';
    if(options.hideNotes || options.askNote===i) qDiv.classList.add('hidden');
    else qDiv.textContent = d.label;

    box.appendChild(rDiv);
    box.appendChild(nDiv);
    box.appendChild(qDiv);
    pal.appendChild(box);

    if(options.clickable) {
      box.addEventListener('click',()=>handleDegreeClick(i));
    }
  });
}

// έΦΑέΦΑ Question generation έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function newQuestion() {
  S.answered = false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback-msg';
  document.getElementById('btn-next').classList.remove('show');
  document.getElementById('choices').style.display='none';
  document.getElementById('choices').innerHTML='';
  document.getElementById('prog-display').style.display='none';
  document.getElementById('degree-palette').style.display='grid';
  document.getElementById('question-card').style.visibility='visible';
  document.getElementById('key-bar').style.visibility='visible';

  const rootIdx = randInt(12);
  S.rootIdx = rootIdx;
  const degrees = getDegrees(rootIdx);
  document.getElementById('key-name').textContent = KEY_NAMES[rootIdx] + ' mayor';

  const qlabel = document.getElementById('q-label');
  const qtext  = document.getElementById('q-text');
  const qsub   = document.getElementById('q-sub');

  if(S.mode === 'grado-acorde') {
    // Given degree label έΗΤ choose chord name
    const degIdx = randInt(7);
    S.askDeg = degIdx;
    const d = degrees[degIdx];

    qlabel.textContent = 'Grado έΗΤ Acorde';
    qtext.textContent = `┬┐Qu├σ acorde es el ${d.roman} de ${KEY_NAMES[rootIdx]} mayor?`;
    qsub.textContent = 'Elige el acorde correcto';

    buildPalette(degrees, { highlighted:degIdx, askNote:degIdx });

    // 4 choices: correct + 3 wrong note names
    const wrongPool = [];
    for(let i=0;i<12;i++) if(i!==d.noteIdx) wrongPool.push(i);
    const wrongs = shuffle(wrongPool).slice(0,3);
    const choices = shuffle([d.noteIdx, ...wrongs]);
    buildChoices(choices.map(ni=>({
      label: NOTES_S[ni],
      value: ni,
    })), d.noteIdx, (val)=>handleChoiceClick(val, d.noteIdx, 'note'));

  } else if(S.mode === 'acorde-grado') {
    // Given chord name έΗΤ click its degree
    const degIdx = randInt(7);
    S.askDeg = degIdx;
    const d = degrees[degIdx];

    qlabel.textContent = 'Acorde έΗΤ Grado';
    qtext.textContent = `${d.chordName}`;
    qsub.textContent = `┬┐Qu├σ grado es en ${KEY_NAMES[rootIdx]} mayor?`;

    buildPalette(degrees, { hideRomans:false, hideNotes:false, clickable:true, highlighted:degIdx });
    // Hide the note/quality of the asked degree only, show others
    // Actually, showing all makes it easy - let's show all notes but ask for roman of highlighted
    // Instead: show the palette with all chord names visible but roman numerals hidden; user clicks the correct degree position
    buildPalette(degrees, { hideRomans:true, clickable:true });
    // But we need to highlight which chord they're looking for
    // Re-highlight:
    const boxes = document.querySelectorAll('.degree-box');
    boxes[degIdx].classList.add('highlighted');
    boxes[degIdx].querySelector('.d-roman').classList.remove('hidden');
    boxes[degIdx].querySelector('.d-roman').textContent = '?';

  } else if(S.mode === 'progresion') {
    // Progression mode: answer each chord one by one
    const progIdx = randInt(PROGRESSIONS.length);
    S.progIdx = progIdx;
    S.progStep = 0;
    const prog = PROGRESSIONS[progIdx];

    qlabel.textContent = 'Progresi├│n';
    qtext.textContent  = prog.name;
    qsub.textContent   = `en ${KEY_NAMES[rootIdx]} mayor έΑΦ Identifica cada acorde`;

    document.getElementById('degree-palette').style.display = 'none';
    buildProgDisplay(prog, degrees);
    askProgStep(0, prog, degrees);
  }
}

// έΦΑέΦΑ Progression mode έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function buildProgDisplay(prog, degrees) {
  const box = document.getElementById('prog-display');
  box.style.display = 'flex';
  box.innerHTML = '';
  prog.degrees.forEach((di,pi)=>{
    if(pi>0){
      const sep=document.createElement('div');
      sep.className='prog-sep';
      sep.textContent='έΗΤ';
      box.appendChild(sep);
    }
    const pc=document.createElement('div');
    pc.className='prog-chord';
    pc.id=`pc-${pi}`;
    pc.innerHTML=`<div class="pc-roman">${DEGREE_ROMAN[di]}</div><div class="pc-name">?</div>`;
    box.appendChild(pc);
  });
}

function askProgStep(step, prog, degrees) {
  const di = prog.degrees[step];
  const d = degrees[di];
  const pc = document.getElementById(`pc-${step}`);
  if(pc) pc.classList.add('asking');

  // Update sub-question
  document.getElementById('q-sub').textContent =
    `Grado ${DEGREE_ROMAN[di]} έΑΦ ┬┐qu├σ acorde es?`;

  // 4 choices: correct note + 3 wrong
  const wrongPool=[];
  for(let i=0;i<12;i++) if(i!==d.noteIdx) wrongPool.push(i);
  const wrongs=shuffle(wrongPool).slice(0,3);
  const choices=shuffle([d.noteIdx,...wrongs]);
  document.getElementById('choices').style.display='flex';
  document.getElementById('choices').innerHTML='';
  buildChoices(choices.map(ni=>({
    label:NOTES_S[ni],
    value:ni,
  })), d.noteIdx, (val)=>handleProgChoice(val,step,prog,degrees));
}

function handleProgChoice(val, step, prog, degrees) {
  const di=prog.degrees[step];
  const d=degrees[di];
  const correct = val===d.noteIdx;
  S.scoreTotal++;
  if(correct) S.scoreOk++;
  updateScoreDisplay();

  // Mark choice buttons
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    const bv=parseInt(btn.dataset.value);
    if(bv===d.noteIdx) btn.classList.add('correct');
    else if(bv===val&&!correct) btn.classList.add('wrong');
  });

  // Fill in the prog chord name
  const pc=document.getElementById(`pc-${step}`);
  if(pc){
    pc.classList.remove('asking');
    pc.classList.add(correct?'answered-ok':'answered-bad');
    pc.querySelector('.pc-name').textContent=d.shortName;
  }

  const nextStep=step+1;
  if(nextStep < prog.degrees.length) {
    // Continue to next chord after brief pause
    setTimeout(()=>{
      document.getElementById('feedback').textContent='';
      document.getElementById('feedback').className='feedback-msg';
      askProgStep(nextStep, prog, degrees);
    }, correct?600:900);
    document.getElementById('feedback').textContent = correct ? 'έεΥ Correcto' : `No έΑΦ era ${d.shortName}`;
    document.getElementById('feedback').className = 'feedback-msg '+(correct?'ok':'bad');
  } else {
    // Progression complete
    const allOk = document.querySelectorAll('.prog-chord.answered-ok').length===prog.degrees.length;
    S.answered=true;
    document.getElementById('feedback').textContent = allOk
      ? '┬κProgresi├│n completa!'
      : correct ? 'έεΥ ├γltimo acorde correcto' : `No έΑΦ era ${d.shortName}`;
    document.getElementById('feedback').className='feedback-msg '+(correct?'ok':'bad');
    document.getElementById('choices').style.display='none';
    document.getElementById('btn-next').classList.add('show');
  }
}

// έΦΑέΦΑ Degree click (acorde-grado mode) έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function handleDegreeClick(i) {
  if(!S.started||S.answered||S.mode!=='acorde-grado') return;
  S.answered=true;
  S.scoreTotal++;
  const correct = i===S.askDeg;
  if(correct) S.scoreOk++;
  updateScoreDisplay();

  const boxes=document.querySelectorAll('.degree-box');
  boxes.forEach((b,bi)=>{
    b.classList.remove('clickable');
    b.querySelector('.d-roman').classList.remove('hidden');
    const degrees=getDegrees(S.rootIdx);
    b.querySelector('.d-roman').textContent=degrees[bi].roman;
  });
  if(correct){
    boxes[i].classList.add('correct');
    document.getElementById('feedback').textContent=`┬κCorrecto! Es el ${DEGREE_ROMAN[i]}`;
    document.getElementById('feedback').className='feedback-msg ok';
  } else {
    boxes[i].classList.add('wrong');
    boxes[S.askDeg].classList.add('correct');
    document.getElementById('feedback').textContent=`No. Era el ${DEGREE_ROMAN[S.askDeg]}`;
    document.getElementById('feedback').className='feedback-msg bad';
  }
  document.getElementById('btn-next').classList.add('show');
}

// έΦΑέΦΑ Generic choice builder έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
function buildChoices(items, correctVal, handler) {
  const box=document.getElementById('choices');
  box.style.display='flex';
  box.innerHTML='';
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=item.label;
    btn.dataset.value=item.value;
    btn.addEventListener('click',()=>handler(item.value));
    box.appendChild(btn);
  });
}

function handleChoiceClick(val, correctVal, type) {
  if(!S.started||S.answered) return;
  if(S.mode==='progresion') return;
  S.answered=true;
  S.scoreTotal++;
  const correct=(val===correctVal)||(String(val)===String(correctVal));
  if(correct) S.scoreOk++;
  updateScoreDisplay();

  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    const bv=parseInt(btn.dataset.value);
    if(bv===correctVal) btn.classList.add('correct');
    else if(bv===val&&!correct) btn.classList.add('wrong');
  });

  if(correct){
    document.getElementById('feedback').textContent='┬κCorrecto!';
    document.getElementById('feedback').className='feedback-msg ok';
  } else {
    const deg=getDegrees(S.rootIdx)[S.askDeg];
    document.getElementById('feedback').textContent=`No. Era ${NOTES_S[correctVal]}`;
    document.getElementById('feedback').className='feedback-msg bad';
    // Reveal correct note in palette
    const boxes=document.querySelectorAll('.degree-box');
    if(boxes[S.askDeg]){
      const nDiv=boxes[S.askDeg].querySelector('.d-note');
      nDiv.textContent=NOTES_S[correctVal];
      nDiv.classList.remove('hidden','ask');
      nDiv.style.color='#4a7c59';
    }
  }
  document.getElementById('btn-next').classList.add('show');
}

function updateScoreDisplay(){
  document.getElementById('score-correct').textContent=S.scoreOk;
  document.getElementById('score-total').textContent=' / '+S.scoreTotal;
}

// έΦΑέΦΑ Mode & controls έΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑέΦΑ
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    S.mode=btn.dataset.mode;
    if(S.started) newQuestion();
  });
});

document.getElementById('btn-start').addEventListener('click',()=>{
  S.started=true;
  document.getElementById('start-overlay').style.display='none';
  newQuestion();
});

document.getElementById('btn-next').addEventListener('click',()=>newQuestion());
